<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Step 1 – New Google Sheet</title><link rel="stylesheet" href="shared.css"><style>body{background:#f8f9fa;}</style></head><body>
<div class="browser-chrome">
  <div class="browser-tabs">
    <div class="browser-tab">
      <img class="favicon" src="https://ssl.gstatic.com/docs/spreadsheets/favicon3.ico" onerror="this.style.display='none'">
      <span>Untitled spreadsheet – Google…</span>
      <span class="close">✕</span>
    </div>
  </div>
  <div class="browser-nav">
    <button class="nav-btn disabled">←</button>
    <button class="nav-btn disabled">→</button>
    <button class="nav-btn">↻</button>
    <div class="address-bar">
      <span class="lock">🔒</span>
      <span class="url">docs.google.com/spreadsheets/d/<em>your-sheet-id</em>/edit</span>
    </div>
  </div>
</div>

<div class="sheets-app">
  <div class="sheets-header">
    <div class="sheets-title-row">
      <svg class="sheets-icon" viewBox="0 0 32 32"><rect width="32" height="32" rx="2" fill="#188038"/><rect x="8" y="8" width="16" height="3" rx="1" fill="white" opacity=".9"/><rect x="8" y="13" width="16" height="3" rx="1" fill="white" opacity=".9"/><rect x="8" y="18" width="10" height="3" rx="1" fill="white" opacity=".9"/></svg>
      <div class="sheets-title" style="position:relative">
        <input type="text" value="Reading Tracker – [Child's Name] 2025" style="font-size:18px;width:340px;">
        <div class="callout arrow-down" style="position:absolute;top:-46px;left:0;background:#ea4335;">← Rename your sheet here</div>
      </div>
      <div class="drive-actions">
        <button class="btn-share">Share</button>
      </div>
    </div>
    <div class="sheets-menu-bar">
      <div class="menu-item">File</div><div class="menu-item">Edit</div><div class="menu-item">View</div><div class="menu-item">Insert</div><div class="menu-item">Format</div><div class="menu-item">Data</div><div class="menu-item">Tools</div><div class="menu-item" style="color:#1a73e8;font-weight:500">Extensions</div><div class="menu-item">Help</div>
    </div>
  </div>

  <div class="sheets-toolbar">
    <button class="toolbar-btn">↩</button><button class="toolbar-btn">↪</button>
    <div class="toolbar-sep"></div>
    <button class="toolbar-btn">🖨</button>
    <div class="toolbar-sep"></div>
    <select class="toolbar-select">Arial</select>
    <div class="toolbar-sep"></div>
    <button class="toolbar-btn">B</button><button class="toolbar-btn"><i>I</i></button>
  </div>
  <div class="formula-bar">
    <div class="cell-ref">A1</div>
    <div class="formula-sep"></div>
    <input class="formula-input" placeholder="" readonly>
  </div>

  <div class="grid-container" style="overflow:auto;flex:1;">
    <div style="display:grid;grid-template-columns:40px repeat(8,120px);">
      <div class="col-header" style="height:24px;"></div>
      <div class="col-header" style="height:24px;">A</div><div class="col-header" style="height:24px;">B</div><div class="col-header" style="height:24px;">C</div><div class="col-header" style="height:24px;">D</div><div class="col-header" style="height:24px;">E</div><div class="col-header" style="height:24px;">F</div><div class="col-header" style="height:24px;">G</div><div class="col-header" style="height:24px;">H</div>
      <div class="row-header" style="height:25px;">1</div><div class="cell selected"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="row-header" style="height:25px;">2</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="row-header" style="height:25px;">3</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="row-header" style="height:25px;">4</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="row-header" style="height:25px;">5</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div style="padding:40px;text-align:center;color:#9aa0a6;font-size:14px;">Blank spreadsheet — just created at <strong>sheets.new</strong></div>
  </div>

  <div class="sheet-tabs">
    <div class="sheet-tab active">Sheet1</div>
    <div class="sheet-tab-add">+</div>
  </div>
</div>
</body></html>
