<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Step 2 – Extensions → Apps Script</title><link rel="stylesheet" href="shared.css"></head><body>
<div class="browser-chrome">
  <div class="browser-tabs"><div class="browser-tab"><span>Untitled spreadsheet – Google Sheets</span><span class="close">✕</span></div></div>
  <div class="browser-nav">
    <button class="nav-btn">←</button><button class="nav-btn disabled">→</button><button class="nav-btn">↻</button>
    <div class="address-bar"><span class="lock">🔒</span><span class="url">docs.google.com/spreadsheets/d/<em>your-sheet-id</em>/edit</span></div>
  </div>
</div>
<div class="sheets-app">
  <div class="sheets-header">
    <div class="sheets-title-row">
      <svg class="sheets-icon" viewBox="0 0 32 32"><rect width="32" height="32" rx="2" fill="#188038"/><rect x="8" y="8" width="16" height="3" rx="1" fill="white" opacity=".9"/><rect x="8" y="13" width="16" height="3" rx="1" fill="white" opacity=".9"/><rect x="8" y="18" width="10" height="3" rx="1" fill="white" opacity=".9"/></svg>
      <div class="sheets-title"><input type="text" value="Reading Tracker – Tejas 2025" style="font-size:18px;width:300px;"></div>
      <div class="drive-actions"><button class="btn-share">Share</button></div>
    </div>
    <div class="sheets-menu-bar" style="position:relative">
      <div class="menu-item">File</div><div class="menu-item">Edit</div><div class="menu-item">View</div><div class="menu-item">Insert</div><div class="menu-item">Format</div><div class="menu-item">Data</div><div class="menu-item">Tools</div>
      <div class="menu-item active" style="position:relative">
        Extensions
        <div class="dropdown" style="top:100%;left:0">
          <div class="dropdown-item">Add-ons ▶</div>
          <div class="dropdown-item highlighted" style="background:#e8f0fe;color:#1a73e8;font-weight:500">
            <span>📝</span> Apps Script
          </div>
          <div class="dropdown-separator"></div>
          <div class="dropdown-item">Macros ▶</div>
          <div class="dropdown-item">AppSheet ▶</div>
        </div>
        <div class="callout arrow-left" style="position:absolute;left:240px;top:40px">Click here → Apps Script</div>
      </div>
      <div class="menu-item">Help</div>
    </div>
  </div>
  <div class="sheets-toolbar">
    <button class="toolbar-btn">↩</button><button class="toolbar-btn">↪</button>
    <div class="toolbar-sep"></div><button class="toolbar-btn">🖨</button>
  </div>
  <div class="formula-bar"><div class="cell-ref">A1</div><div class="formula-sep"></div><input class="formula-input" readonly></div>
  <div class="grid-container" style="flex:1;overflow:auto;">
    <div style="display:grid;grid-template-columns:40px repeat(6,140px);">
      <div class="col-header" style="height:24px;"></div>
      <div class="col-header" style="height:24px;">A</div><div class="col-header" style="height:24px;">B</div><div class="col-header" style="height:24px;">C</div><div class="col-header" style="height:24px;">D</div><div class="col-header" style="height:24px;">E</div><div class="col-header" style="height:24px;">F</div>
      <div class="row-header" style="height:25px;">1</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="row-header" style="height:25px;">2</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="row-header" style="height:25px;">3</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
  </div>
  <div class="sheet-tabs"><div class="sheet-tab active">Sheet1</div><div class="sheet-tab-add">+</div></div>
</div>
</body></html>
